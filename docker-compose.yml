services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    env_file:
      - ./backend/.env
    environment:
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage
    depends_on:
      - qdrant

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: rag-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  qdrant_data:
  backend_storage: